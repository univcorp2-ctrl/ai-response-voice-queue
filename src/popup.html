<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Response Voice Queue</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <div class="brand"><span class="pulse"></span><div><strong>Voice Queue</strong><small>AI回答の自動読み上げ</small></div></div>
    <section class="status-card">
      <div><span>待機中</span><strong id="queueCount">0</strong></div>
      <div><span>状態</span><strong id="speakingState">停止中</strong></div>
    </section>
    <label class="toggle"><span>自動読み上げ</span><input id="enabled" type="checkbox"><i></i></label>
    <div class="actions">
      <button id="readNext" class="primary">次を読む</button>
      <button id="stop">停止</button>
      <button id="clear">キューを空にする</button>
    </div>
    <button id="options" class="link">詳細設定を開く</button>
  </main>
  <script src="popup.js"></script>
</body>
</html>
