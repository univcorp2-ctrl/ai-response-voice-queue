<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">AI Response Voice Queue architecture</title>
  <desc id="desc">ChatGPT, Claude and Codex responses flow through detection, queueing, conflict checks and text-to-speech.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08111f"/><stop offset="1" stop-color="#142a3d"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#56e39f"/><stop offset="1" stop-color="#4ea8ff"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-opacity=".3"/></filter>
  </defs>
  <rect width="1440" height="720" rx="32" fill="url(#bg)"/>
  <circle cx="1260" cy="90" r="210" fill="#24537a" opacity=".18"/>
  <circle cx="160" cy="650" r="230" fill="#1c8f68" opacity=".12"/>
  <text x="72" y="88" fill="#f7fbff" font-family="Arial, sans-serif" font-size="42" font-weight="700">AI Response Voice Queue</text>
  <text x="72" y="132" fill="#b8c9d8" font-family="Arial, sans-serif" font-size="22">AIの回答を見落とさず、競合を避けて、順番に音声で届ける</text>
  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="72" y="210" width="275" height="300" rx="24" fill="#132435" stroke="#31506b"/>
    <text x="102" y="254" fill="#56e39f" font-size="18" font-weight="700">1. DETECT</text>
    <text x="102" y="300" fill="#fff" font-size="28" font-weight="700">回答を検出</text>
    <text x="102" y="350" fill="#b8c9d8" font-size="19">ChatGPT</text><text x="102" y="387" fill="#b8c9d8" font-size="19">Claude</text><text x="102" y="424" fill="#b8c9d8" font-size="19">Codex / OpenAI</text>
    <rect x="388" y="210" width="300" height="300" rx="24" fill="#132435" stroke="#31506b"/>
    <text x="418" y="254" fill="#4ea8ff" font-size="18" font-weight="700">2. ORGANIZE</text>
    <text x="418" y="300" fill="#fff" font-size="28" font-weight="700">キューを整理</text>
    <text x="418" y="350" fill="#b8c9d8" font-size="19">重複排除</text><text x="418" y="387" fill="#b8c9d8" font-size="19">アクティブタブ優先</text><text x="418" y="424" fill="#b8c9d8" font-size="19">待機時間を考慮</text>
    <rect x="729" y="210" width="300" height="300" rx="24" fill="#132435" stroke="#31506b"/>
    <text x="759" y="254" fill="#ffcf5c" font-size="18" font-weight="700">3. AVOID CONFLICTS</text>
    <text x="759" y="300" fill="#fff" font-size="28" font-weight="700">競合を回避</text>
    <text x="759" y="350" fill="#b8c9d8" font-size="19">入力中は待機</text><text x="759" y="387" fill="#b8c9d8" font-size="19">他タブ音声中は待機</text><text x="759" y="424" fill="#b8c9d8" font-size="19">一件ずつ処理</text>
    <rect x="1070" y="210" width="298" height="300" rx="24" fill="url(#accent)"/>
    <text x="1100" y="254" fill="#082033" font-size="18" font-weight="700">4. SPEAK</text>
    <text x="1100" y="300" fill="#061827" font-size="28" font-weight="700">自動読み上げ</text>
    <path d="M1140 372h42l54-48v128l-54-48h-42z" fill="#061827"/>
    <path d="M1260 352c25 22 25 52 0 74M1284 332c42 40 42 94 0 134" fill="none" stroke="#061827" stroke-width="12" stroke-linecap="round"/>
  </g>
  <path d="M347 360h41M688 360h41M1029 360h41" stroke="#79bfff" stroke-width="8" stroke-linecap="round" stroke-dasharray="12 14"/>
  <rect x="72" y="570" width="1296" height="78" rx="20" fill="#0b1826" stroke="#29445c"/>
  <text x="102" y="619" fill="#dcecff" font-family="Arial, sans-serif" font-size="20">Local-first • No external API keys • Chrome TTS • GitHub Actions • Cloudflare Pages • Google Drive Sync</text>
</svg>
